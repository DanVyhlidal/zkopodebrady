<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>ZKO Poděbrady - Administrace (CMS)</title>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <script>
      const FocalPointControl = createClass({
        getInitialState() {
          return { imageUrl: '' };
        },
        componentDidMount() {
          this.findImage();
          this.interval = setInterval(this.findImage, 1000);
        },
        componentWillUnmount() {
          clearInterval(this.interval);
        },
        findImage() {
          if (!this.containerRef) return;
          const parentList = this.containerRef.closest('li, [class*="ListItem"]');
          if (!parentList) return;
          
          const imgEl = parentList.querySelector('img[src^="blob:"], img[src^="/images"]');
          if (imgEl && imgEl.src !== this.state.imageUrl) {
            this.setState({ imageUrl: imgEl.src });
          } else if (!imgEl && this.state.imageUrl) {
            this.setState({ imageUrl: '' });
          }
        },
        handleImageClick(e) {
          const rect = e.target.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          const value = `${Math.round(x)}% ${Math.round(y)}%`;
          this.props.onChange(value);
        },
        render() {
          const { value, onChange, forID, classNameWrapper } = this.props;
          const { imageUrl } = this.state;
          
          return h('div', { id: forID, className: classNameWrapper, ref: (el) => this.containerRef = el },
            imageUrl ? 
            h('div', { style: { position: 'relative', display: 'inline-block', border: '2px solid #ccc', cursor: 'crosshair', borderRadius: '4px', overflow: 'hidden' } },
              h('img', { src: imageUrl, style: { maxWidth: '100%', maxHeight: '400px', display: 'block' }, onClick: this.handleImageClick }),
              value && value.includes('%') ? h('div', { 
                style: {
                   position: 'absolute',
                   left: value.split(' ')[0],
                   top: value.split(' ')[1],
                   width: '16px',
                   height: '16px',
                   backgroundColor: 'red',
                   borderRadius: '50%',
                   transform: 'translate(-50%, -50%)',
                   pointerEvents: 'none',
                   border: '2px solid white',
                   boxShadow: '0 0 4px rgba(0,0,0,0.5)'
                }
              }) : null
            ) : 
            h('div', { style: { padding: '15px', background: '#f5f5f5', color: '#666', border: '1px dashed #ccc', borderRadius: '4px' } }, 'Nejprve nahrajte fotku psa výše. Zde se poté zobrazí pro výběr výřezu.'),
            
            h('div', { style: { marginTop: '10px', display: 'flex', alignItems: 'center', gap: '10px' } }, 
              h('span', { style: { color: '#666', fontSize: '14px' } }, 'Aktuální souřadnice:'),
              h('input', { type: 'text', value: value || '50% 25%', onChange: (e) => onChange(e.target.value), style: { padding: '6px', border: '1px solid #ccc', borderRadius: '4px', width: '100px' } })
            )
          );
        }
      });

      CMS.registerWidget('focal_point', FocalPointControl);
    </script>
  </body>
</html>
